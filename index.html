<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html lang="pl" xmlns="http://www.w3.org/1999/xhtml">
  <head>
    <title>Zgadnij Liczbę</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <link rel="stylesheet" href="https://pyscript.net/releases/2026.3.1/core.css">
    <script type="module" src="https://pyscript.net/releases/2026.3.1/core.js"></script>
    <script src="coi-serviceworker.min.js"></script>
    <style>
      * {
        box-sizing: border-box;
      }
      html, body {
        height: 100vh;
        margin: 0;
        overflow: hidden;
      }
      body {
        background-color: #000;
        color: #00ff00;
        font-family: 'Courier New', monospace;
        line-height: 1.3;
        border: 3px solid #00ff00;
        padding: 0.5rem;
        box-shadow: 0 0 10px rgba(0, 255, 0, 0.5);
        display: flex;
        flex-direction: column;
      }
      h1 {
        text-shadow: 0 0 10px #00ff00;
        border-bottom: 2px solid #00ff00;
        padding-bottom: 0.3rem;
        margin: 0 0 0.3rem 0;
        font-size: 1.2rem;
      }
      p {
        margin: 0.3rem 0;
        font-size: 0.9rem;
      }
      a {
        color: #00ff00;
      }
      a:hover {
        background-color: #00ff00;
        color: #000;
        box-shadow: 0 0 10px #00ff00;
      }
      .bottom-row {
        display: flex;
        flex-direction: row;
        justify-content: space-between;
        align-items: center;
      }
      .counter {
        height: 20px;
      }
      py-terminal {
        flex: 1;
        overflow: hidden;
        min-height: 90px;
      }
      button {
        background-color: #003300;
        color: #00ff00;
        border: 2px solid #00ff00;
        padding: 0.4rem 0.8rem;
        font-family: 'Courier New', monospace;
        font-size: 0.85rem;
        cursor: pointer;
        margin-top: 0.3rem;
        transition: all 0.2s;
        align-self: flex-start;
      }
      button:hover {
        background-color: #00ff00;
        color: #000;
        box-shadow: 0 0 10px #00ff00;
      }
      button:active {
        transform: scale(0.95);
      }
    </style>
  </head>
  <body>
    <h1>► ZGADNIJ LICZBĘ ◄</h1>
    <p>Klasyczna gra w odgadywanie liczby z trybem dla wielu graczy. Miłej zabawy!</p>
    <py-config>
    terminal = true
    </py-config>
    <script type="py" src="./guess-game.py" terminal worker></script>
    <div class="bottom-row">
      <button onclick="location.reload()">ROZPOCZNIJ NA NOWO</button>
      <img class="counter" src="https://visitor-badge.laobi.icu/badge?page_id=czuz.zgadnij-liczbe.page&left_color=%23003300&right_color=%23000000&format=true&left_text=Liczba%20gości" alt="Liczba gości"/>
      <p>Copyright &copy; 2026 <a href="https://github.com/Czuz/zgadnij-liczbe/" target="_blank">Czuz</a></p>
    </div>
  </body>
</html>
